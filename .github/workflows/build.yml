name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt install -y libgstreamer1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good
          pip install Cython==0.29.33 buildozer
      - name: Init Buildozer
        run: |
          buildozer init
      - name: Configure buildozer.spec
        run: |
          sed -i 's/^title =.*/title = MyGame/' buildozer.spec
          sed -i 's/^package.name =.*/package.name = mygame/' buildozer.spec
          sed -i 's/^package.domain =.*/package.domain = com.you/' buildozer.spec
          sed -i 's/^requirements =.*/requirements = python3,pygame,pyjnius,sdl2,sdl2_image,sdl2_mixer,sdl2_ttf,png,jpeg/' buildozer.spec
          sed -i 's/^#android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          sed -i 's/^#android.bootstrap =.*/android.bootstrap = sdl2/' buildozer.spec
          sed -i 's/^#android.fullscreen =.*/android.fullscreen = 1/' buildozer.spec
          sed -i 's/^#orientation =.*/orientation = landscape/' buildozer.spec
          echo "--- buildozer.spec is ---"
          grep -n "^requirements\|^title\|^package\.\|^android\.archs\|^android\.bootstrap\|^orientation\|android.fullscreen" buildozer.spec
      - name: Build APK
        run: |
          buildozer -v android debug 2>&1
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-APK
          path: bin/*.apk
